<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evolving Codes</title>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3466031817024466"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="mainContainer">
      <nav>
        <span class="logo">EVOLVING CODES</span>
        <div class="links">
          <a href="/">Home</a>
          <a href="#">Articles</a>
          <a href="/projects">Projects</a>
          <a href="#">Services</a>
          <a href="#">Contact Us</a>
        </div>
      </nav>
      <header>
        <div class="logo"><span>EC</span></div>
        <div class="heroText">
          <h1>Premium Services</h1>
          <p>
            We provide wide range of services including website design, SEO’s,
            backend-maintenance and many more
          </p>
          <button>SERVICES</button>
        </div>
      </header>
      <section id="contactForm">
        <h2>Get in touch.</h2>
        <div class="formDiv">
          <form name="contact" method="post" netlify>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" />
            <label for="eMail">E-mail:</label>
            <input type="email" id="eMail" name="email" />
            <label for="phnNo">Phone No:</label>
            <input type="tel" id="phnNo" name="phNo" />
            <label for="msg">Message:</label>
            <textarea id="msg" cols="2" rows="2" name="msg"></textarea>
            <button type="submit">Calculate</button>
            <p>We will contact you within 5 working days.</p>
          </form>
        </div>
      </section>
    </div>
  </body>
</html>
